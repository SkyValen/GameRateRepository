<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>GamesRate</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">GamesRate</div>
        <div class="user-controls">
            <a href="#">
                <button class="login-btn">Вход\Регистрация</button>
            </a>
        </div>
    </header>

    <div class="main-container">
        <main class="content">
            <div id="games-list">...Загрузка</div>

            <div class="pagination-container">
                <div class="nav-buttons">
                    <button id="prev-btn" onclick="prev()">Назад</button>
                    <span id="total-count"></span>
                    <button id="next-btn" onclick="next()">Вперёд</button>
                </div>
                <div class="pages">
                    <input id="current-page" value="?" onchange="choosePage(event)">
                    / <span id="out-of"></span>
                    </p>
                </div>
            </div>
        </main>


        <aside class="sidebar">
            <h3>tags</h3>
            <div class="tag-list" id="tag-list">
            </div>
        </aside>
    </div>
    <script src="../scripts/mainPageScript.js"></script>

</body>

</html>
